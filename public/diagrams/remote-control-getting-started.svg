<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480"
     role="img" aria-labelledby="title desc">
  <title id="title">เริ่มใช้ Remote Control — 4 ขั้นตอน</title>
  <desc id="desc">แผนภาพ 4 ขั้นตอนเริ่มต้นใช้ Claude Code Remote Control: เปิดบนคอม, สแกน QR, เริ่มคำสั่งง่ายๆ, ต่อ MCP servers</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4FC3F7"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #0F0F1A; }
    .title-text { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 24px; font-weight: 700; fill: #EEEEEE; text-anchor: middle; }
    .card { fill: #1A1A2E; rx: 16; }
    .card-num { font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 800; text-anchor: middle; }
    .card-icon { font-size: 36px; text-anchor: middle; dominant-baseline: central; }
    .card-title { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 16px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; }
    .card-desc { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 12px; fill: #AAAAAA; text-anchor: middle; }
    .card-action { font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; }
    .connector { fill: none; stroke: #FFD54F; stroke-width: 2; marker-end: url(#arrow); }
    .difficulty { rx: 10; }
    .diff-text { font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 700; text-anchor: middle; }
    .tip-box { fill: #FFD54F; fill-opacity: 0.05; stroke: #FFD54F; stroke-width: 1; rx: 12; }
    .tip-text { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 13px; fill: #FFD54F; text-anchor: middle; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Title -->
  <text class="title-text" x="600" y="40">🚀 เริ่มใช้ Remote Control — 4 ขั้นตอน</text>

  <!-- ===== Step 1 ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="250" height="280" class="card" stroke="#4FC3F7" stroke-width="1.5"/>
  </g>
  <text class="card-num" x="165" y="120" fill="#4FC3F7" fill-opacity="0.15">01</text>
  <text class="card-icon" x="165" y="130">💻</text>
  <text class="card-title" x="165" y="175">เปิด Claude Code บนคอม</text>
  <text class="card-desc" x="165" y="200">เปิด terminal</text>
  <text class="card-desc" x="165" y="218">รัน Claude Code ปกติ</text>
  <rect x="80" y="240" width="170" height="30" rx="6" fill="#4FC3F7" fill-opacity="0.1" stroke="#4FC3F7" stroke-width="0.5"/>
  <text class="card-action" x="165" y="260" fill="#4FC3F7">$ claude</text>
  <!-- Difficulty badge -->
  <rect x="115" y="290" width="100" height="22" class="difficulty" fill="#66BB6A" fill-opacity="0.15" stroke="#66BB6A" stroke-width="1"/>
  <text class="diff-text" x="165" y="305" fill="#66BB6A">ง่ายมาก</text>

  <!-- Arrow 1→2 -->
  <path class="connector" d="M 294,210 H 330"/>

  <!-- ===== Step 2 ===== -->
  <g filter="url(#shadow)">
    <rect x="330" y="70" width="250" height="280" class="card" stroke="#FF7043" stroke-width="1.5"/>
  </g>
  <text class="card-num" x="455" y="120" fill="#FF7043" fill-opacity="0.15">02</text>
  <text class="card-icon" x="455" y="130">📱</text>
  <text class="card-title" x="455" y="175">สแกน QR จากมือถือ</text>
  <text class="card-desc" x="455" y="200">จะเห็น QR code บนจอคอม</text>
  <text class="card-desc" x="455" y="218">สแกนจาก Claude app มือถือ</text>
  <rect x="370" y="240" width="170" height="30" rx="6" fill="#FF7043" fill-opacity="0.1" stroke="#FF7043" stroke-width="0.5"/>
  <text class="card-action" x="455" y="260" fill="#FF7043">📷 Scan QR</text>
  <rect x="405" y="290" width="100" height="22" class="difficulty" fill="#66BB6A" fill-opacity="0.15" stroke="#66BB6A" stroke-width="1"/>
  <text class="diff-text" x="455" y="305" fill="#66BB6A">ง่ายมาก</text>

  <!-- Arrow 2→3 -->
  <path class="connector" d="M 584,210 H 620"/>

  <!-- ===== Step 3 ===== -->
  <g filter="url(#shadow)">
    <rect x="620" y="70" width="250" height="280" class="card" stroke="#FFD54F" stroke-width="1.5"/>
  </g>
  <text class="card-num" x="745" y="120" fill="#FFD54F" fill-opacity="0.15">03</text>
  <text class="card-icon" x="745" y="130">💬</text>
  <text class="card-title" x="745" y="175">เริ่มจากคำสั่งง่ายๆ</text>
  <text class="card-desc" x="745" y="200">"สรุปไฟล์นี้ให้หน่อย"</text>
  <text class="card-desc" x="745" y="218">"ดึงข้อมูลจาก X"</text>
  <rect x="660" y="240" width="170" height="30" rx="6" fill="#FFD54F" fill-opacity="0.1" stroke="#FFD54F" stroke-width="0.5"/>
  <text class="card-action" x="745" y="260" fill="#FFD54F">ทดลองสั่งงาน</text>
  <rect x="695" y="290" width="100" height="22" class="difficulty" fill="#FFD54F" fill-opacity="0.15" stroke="#FFD54F" stroke-width="1"/>
  <text class="diff-text" x="745" y="305" fill="#FFD54F">ปานกลาง</text>

  <!-- Arrow 3→4 -->
  <path class="connector" d="M 874,210 H 910"/>

  <!-- ===== Step 4 ===== -->
  <g filter="url(#shadow)">
    <rect x="910" y="70" width="250" height="280" class="card" stroke="#66BB6A" stroke-width="1.5"/>
  </g>
  <text class="card-num" x="1035" y="120" fill="#66BB6A" fill-opacity="0.15">04</text>
  <text class="card-icon" x="1035" y="130">🔗</text>
  <text class="card-title" x="1035" y="175">ต่อ MCP Servers</text>
  <text class="card-desc" x="1035" y="200">Notion, CRM, Fireflies</text>
  <text class="card-desc" x="1035" y="218">เพื่อทำงานจริงได้</text>
  <rect x="950" y="240" width="170" height="30" rx="6" fill="#66BB6A" fill-opacity="0.1" stroke="#66BB6A" stroke-width="0.5"/>
  <text class="card-action" x="1035" y="260" fill="#66BB6A">สร้าง AI OS</text>
  <rect x="985" y="290" width="100" height="22" class="difficulty" fill="#FF7043" fill-opacity="0.15" stroke="#FF7043" stroke-width="1"/>
  <text class="diff-text" x="1035" y="305" fill="#FF7043">ขั้นสูง</text>

  <!-- Bottom tip box -->
  <rect x="200" y="390" width="800" height="60" class="tip-box"/>
  <text class="tip-text" x="600" y="420">💡 จำไว้: สร้าง AI Operating System ก่อน → แล้วค่อย remote มัน</text>
  <text x="600" y="440" font-family="'Sarabun', 'Inter', sans-serif" font-size="11px" fill="#888888" text-anchor="middle">รีโมทไร้ค่าถ้าไม่มี TV</text>
</svg>