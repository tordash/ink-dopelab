  <!-- Arrow from DB to Analysis -->
  <line x1="350" y1="400" x2="430" y2="400" stroke="#F39C12" stroke-width="2" marker-end="url(#arr2)"/>

  <text x="620" y="90" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="10" font-weight="600" fill="#94A3B8" letter-spacing="2">INTELLIGENCE LAYER</text>

  <!-- Analysis Box -->
  <rect x="440" y="102" width="320" height="155" rx="12" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5" filter="url(#s2)"/>
  <rect x="440" y="102" width="320" height="30" rx="12" fill="url(#navyGrad2)"/>
  <rect x="440" y="120" width="320" height="12" fill="url(#navyGrad2)"/>
  <text x="600" y="122" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">AI Analysis Engine</text>

  <!-- Analysis items -->
  <rect x="458" y="144" width="135" height="40" rx="6" fill="#EBF5FF" stroke="#2B4C7E" stroke-width="0.8"/>
  <text x="525" y="161" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#2B4C7E">Cost Analysis</text>
  <text x="525" y="175" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Per-dish cost breakdown</text>

  <rect x="607" y="144" width="135" height="40" rx="6" fill="#ECFDF5" stroke="#27AE60" stroke-width="0.8"/>
  <text x="674" y="161" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#27AE60">Usage Variance</text>
  <text x="674" y="175" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Should-use vs actual</text>

  <rect x="458" y="194" width="135" height="40" rx="6" fill="#FEF3C7" stroke="#F39C12" stroke-width="0.8"/>
  <text x="525" y="211" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#E67E22">Profit Margins</text>
  <text x="525" y="225" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">GP per channel</text>

  <rect x="607" y="194" width="135" height="40" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="0.8"/>
  <text x="674" y="211" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#DC2626">Anomaly Detection</text>
  <text x="674" y="225" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Spike/drop alerts</text>

  <!-- Arrow from Analysis to Reports -->
  <line x1="600" y1="257" x2="600" y2="285" stroke="#27AE60" stroke-width="2" marker-end="url(#arr2g)"/>

  <!-- Reports section -->
  <rect x="440" y="290" width="320" height="145" rx="12" fill="#FFFFFF" stroke="#27AE60" stroke-width="1.5" filter="url(#s2)"/>
  <rect x="440" y="290" width="320" height="30" rx="12" fill="url(#greenGrad2)"/>
  <rect x="440" y="308" width="320" height="12" fill="url(#greenGrad2)"/>
  <text x="600" y="310" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Actionable Outputs</text>

  <!-- Report items -->
  <rect x="458" y="332" width="140" height="38" rx="6" fill="#ECFDF5"/>
  <text x="528" y="349" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#1E293B">Daily Dashboard</text>
  <text x="528" y="362" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Revenue, orders, mix</text>

  <rect x="610" y="332" width="140" height="38" rx="6" fill="#ECFDF5"/>
  <text x="680" y="349" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#1E293B">Inventory Alerts</text>
  <text x="680" y="362" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Low stock, reorder</text>

  <rect x="458" y="380" width="140" height="38" rx="6" fill="#ECFDF5"/>
  <text x="528" y="397" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#1E293B">Variance Reports</text>
  <text x="528" y="410" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Waste tracking</text>

  <rect x="610" y="380" width="140" height="38" rx="6" fill="#ECFDF5"/>
  <text x="680" y="397" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="600" fill="#1E293B">Slack Notifications</text>
  <text x="680" y="410" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="7.5" fill="#64748B">Real-time alerts</text>

  <!-- Connection line from DB to Analysis (curved) -->
  <path d="M 350 390 Q 395 340 440 200" stroke="#F39C12" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arr2)"/>

  <!-- ===== Bottom Stats Bar ===== -->
  <rect x="40" y="460" width="720" height="44" rx="8" fill="url(#navyGrad2)" filter="url(#s2)"/>
  <text x="130" y="484" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#B0C4DE">3 Channels</text>
  <text x="130" y="496" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="700" fill="#F39C12">GrabFood + LINE MAN + POS</text>

  <line x1="260" y1="470" x2="260" y2="498" stroke="#3D5F8C" stroke-width="1"/>

  <text x="340" y="484" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#B0C4DE">Auto-Processed</text>
  <text x="340" y="496" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="700" fill="#F39C12">PDF + CSV + HTML</text>

  <line x1="420" y1="470" x2="420" y2="498" stroke="#3D5F8C" stroke-width="1"/>

  <text x="520" y="484" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#B0C4DE">Database</text>
  <text x="520" y="496" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="700" fill="#F39C12">28 Tables | SQLite</text>

  <line x1="620" y1="470" x2="620" y2="498" stroke="#3D5F8C" stroke-width="1"/>

  <text x="700" y="484" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#B0C4DE">Zero Manual Entry</text>
  <text x="700" y="496" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="700" fill="#27AE60">Fully Automated</text>
</svg>