<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <filter id="s2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2B4C7E" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="navyGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B4C7E"/>
      <stop offset="100%" stop-color="#1a3a66"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <linearGradient id="greenGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#1e8c4d"/>
    </linearGradient>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
    </marker>
    <marker id="arr2g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27AE60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#navyGrad2)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="18" font-weight="700" fill="#2B4C7E">AI-Powered Restaurant Stock Management</text>
  <text x="400" y="56" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="11" fill="#64748B">Automated Sales Pipeline: 3 Channels to Unified Database to Actionable Insights</text>

  <!-- ===== ROW 1: DATA SOURCES ===== -->
  <text x="160" y="90" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="10" font-weight="600" fill="#94A3B8" letter-spacing="2">DATA SOURCES</text>

  <!-- GrabFood -->
  <rect x="40" y="102" width="110" height="68" rx="10" fill="#FFFFFF" stroke="#27AE60" stroke-width="2" filter="url(#s2)"/>
  <rect x="40" y="102" width="110" height="22" rx="10" fill="#27AE60"/>
  <rect x="40" y="114" width="110" height="10" fill="#27AE60"/>
  <text x="95" y="118" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">GrabFood</text>
  <text x="95" y="142" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#475569">PDF Reports</text>
  <text x="95" y="156" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="8" fill="#94A3B8">Daily invoices</text>

  <!-- LINE MAN -->
  <rect x="170" y="102" width="110" height="68" rx="10" fill="#FFFFFF" stroke="#27AE60" stroke-width="2" filter="url(#s2)"/>
  <rect x="170" y="102" width="110" height="22" rx="10" fill="#27AE60"/>
  <rect x="170" y="114" width="110" height="10" fill="#27AE60"/>
  <text x="225" y="118" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">LINE MAN</text>
  <text x="225" y="142" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#475569">CSV Balance</text>
  <text x="225" y="156" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="8" fill="#94A3B8">Daily reports</text>

  <!-- POS -->
  <rect x="300" y="102" width="110" height="68" rx="10" fill="#FFFFFF" stroke="#27AE60" stroke-width="2" filter="url(#s2)"/>
  <rect x="300" y="102" width="110" height="22" rx="10" fill="#27AE60"/>
  <rect x="300" y="114" width="110" height="10" fill="#27AE60"/>
  <text x="355" y="118" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">POS System</text>
  <text x="355" y="142" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#475569">HTML Reports</text>
  <text x="355" y="156" text-anchor="middle" font-family="Inter, Sarabun, sans-serif" font-size="8" fill="#94A3B8">Walk-in sales</text>

  <!-- Arrows from sources down -->
  <line x1="95" y1="170" x2="95" y2="195" stroke="#F39C12" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="225" y1="170" x2="225" y2="195" stroke="#F39C12" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="355" y1="170" x2="355" y2="195" stroke="#F39C12" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- ===== ROW 2: GMAIL IMAP (Wide box) ===== -->
  <rect x="40" y="200" width="370" height="52" rx="10" fill="url(#navyGrad2)" filter="url(#s2)"/>
  <!-- Email icon -->
  <rect x="58" y="214" width="22" height="16" rx="3" fill="none" stroke="#F39C12" stroke-width="1.5"/>
  <polyline points="58,214 69,224 80,214" fill="none" stroke="#F39C12" stroke-width="1.5"/>
  <text x="92" y="225" font-family="Inter, Sarabun, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Gmail IMAP Auto-Fetch</text>
  <text x="92" y="242" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#B0C4DE">nntn.management@gmail.com | Automated daily extraction</text>

  <!-- Arrow down from Gmail -->
  <line x1="225" y1="252" x2="225" y2="280" stroke="#F39C12" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- ===== ROW 3: PARSER ===== -->
  <rect x="120" y="285" width="210" height="52" rx="10" fill="#FFFFFF" stroke="#F39C12" stroke-width="2" filter="url(#s2)"/>
  <!-- Gear icon -->
  <circle cx="148" cy="311" r="12" fill="#FEF3C7" stroke="#F39C12" stroke-width="1.5"/>
  <circle cx="148" cy="311" r="4" fill="#F39C12"/>
  <text x="168" y="307" font-family="Inter, Sarabun, sans-serif" font-size="11" font-weight="600" fill="#1E293B">AI Parser Engine</text>
  <text x="168" y="323" font-family="Inter, Sarabun, sans-serif" font-size="8.5" fill="#64748B">PDF / CSV / HTML extraction</text>

  <!-- Arrow down from Parser -->
  <line x1="225" y1="337" x2="225" y2="365" stroke="#F39C12" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- ===== ROW 4: DATABASE (Central) ===== -->
  <!-- Database shape -->
  <rect x="100" y="370" width="250" height="60" rx="10" fill="url(#navyGrad2)" filter="url(#s2)"/>
  <!-- DB icon (cylinder) -->
  <ellipse cx="133" cy="392" rx="14" ry="7" fill="none" stroke="#F39C12" stroke-width="1.5"/>
  <line x1="119" y1="392" x2="119" y2="410" stroke="#F39C12" stroke-width="1.5"/>
  <line x1="147" y1="392" x2="147" y2="410" stroke="#F39C12" stroke-width="1.5"/>
  <ellipse cx="133" cy="410" rx="14" ry="7" fill="none" stroke="#F39C12" stroke-width="1.5"/>
  <text x="160" y="397" font-family="Inter, Sarabun, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">SQLite Database</text>
  <text x="160" y="414" font-family="Inter, Sarabun, sans-serif" font-size="9" fill="#B0C4DE">nntn.db | 28 tables | Unified schema</text>

