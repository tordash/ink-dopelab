<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&amp;display=swap');
      text { font-family: 'Kanit', sans-serif; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF9900;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGlow)" rx="12"/>

  <!-- Edges (connections) -->
  <g stroke="#FFCC0025" stroke-width="1" fill="none">
    <!-- Cluster 1: Clients -->
    <line x1="180" y1="160" x2="300" y2="220"/>
    <line x1="180" y1="160" x2="120" y2="260"/>
    <line x1="180" y1="160" x2="250" y2="120"/>
    <line x1="120" y1="260" x2="200" y2="310"/>
    <line x1="200" y1="310" x2="300" y2="220"/>
    <line x1="120" y1="260" x2="80" y2="350"/>
    <line x1="200" y1="310" x2="160" y2="400"/>
    <!-- Cluster 2: Technical -->
    <line x1="500" y1="130" x2="600" y2="200"/>
    <line x1="500" y1="130" x2="420" y2="200"/>
    <line x1="600" y1="200" x2="550" y2="300"/>
    <line x1="420" y1="200" x2="550" y2="300"/>
    <line x1="600" y1="200" x2="700" y2="260"/>
    <line x1="550" y1="300" x2="650" y2="360"/>
    <line x1="700" y1="260" x2="650" y2="360"/>
    <!-- Cluster 3: Sessions -->
    <line x1="350" y1="370" x2="250" y2="400"/>
    <line x1="350" y1="370" x2="450" y2="420"/>
    <line x1="250" y1="400" x2="300" y2="450"/>
    <line x1="450" y1="420" x2="350" y2="460"/>
    <!-- Cross-cluster connections -->
    <line x1="300" y1="220" x2="420" y2="200" stroke="#FFCC0015" stroke-width="0.8"/>
    <line x1="200" y1="310" x2="350" y2="370" stroke="#FFCC0015" stroke-width="0.8"/>
    <line x1="550" y1="300" x2="450" y2="420" stroke="#FFCC0015" stroke-width="0.8"/>
    <line x1="250" y1="120" x2="500" y2="130" stroke="#FFCC0015" stroke-width="0.8"/>
    <line x1="160" y1="400" x2="250" y2="400" stroke="#FFCC0015" stroke-width="0.8"/>
    <line x1="650" y1="360" x2="450" y2="420" stroke="#FFCC0015" stroke-width="0.8"/>
    <!-- Extra subtle edges for density -->
    <line x1="80" y1="350" x2="160" y2="400" stroke="#FFCC0010"/>
    <line x1="250" y1="120" x2="300" y2="220" stroke="#FFCC0010"/>
    <line x1="500" y1="130" x2="550" y2="300" stroke="#FFCC0010"/>
    <line x1="350" y1="370" x2="300" y2="450" stroke="#FFCC0010"/>
    <line x1="700" y1="260" x2="600" y2="200" stroke="#FFCC0010"/>
  </g>

  <!-- Nodes: Clients (cyan-ish) -->
  <g filter="url(#glow)">
    <circle cx="180" cy="160" r="18" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="2"/>
    <circle cx="120" cy="260" r="12" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1.5"/>
    <circle cx="300" cy="220" r="14" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1.5"/>
    <circle cx="200" cy="310" r="10" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1.5"/>
    <circle cx="250" cy="120" r="9" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1"/>
    <circle cx="80" cy="350" r="8" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1"/>
    <circle cx="160" cy="400" r="10" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1"/>
  </g>

  <!-- Nodes: Technical (gold) -->
  <g filter="url(#glow)">
    <circle cx="500" cy="130" r="20" fill="#0a0a0a" stroke="#FFCC00" stroke-width="2.5"/>
    <circle cx="600" cy="200" r="14" fill="#0a0a0a" stroke="#FFCC00" stroke-width="2"/>
    <circle cx="420" cy="200" r="12" fill="#0a0a0a" stroke="#FFCC00" stroke-width="1.5"/>
    <circle cx="550" cy="300" r="16" fill="#0a0a0a" stroke="#FFCC00" stroke-width="2"/>
    <circle cx="700" cy="260" r="10" fill="#0a0a0a" stroke="#FFCC00" stroke-width="1.5"/>
    <circle cx="650" cy="360" r="11" fill="#0a0a0a" stroke="#FFCC00" stroke-width="1.5"/>
  </g>

  <!-- Nodes: Sessions (pink/magenta) -->
  <g filter="url(#glow)">
    <circle cx="350" cy="370" r="15" fill="#0a0a0a" stroke="#FF6B9D" stroke-width="2"/>
    <circle cx="250" cy="400" r="10" fill="#0a0a0a" stroke="#FF6B9D" stroke-width="1.5"/>
    <circle cx="450" cy="420" r="12" fill="#0a0a0a" stroke="#FF6B9D" stroke-width="1.5"/>
    <circle cx="300" cy="450" r="8" fill="#0a0a0a" stroke="#FF6B9D" stroke-width="1"/>
    <circle cx="350" cy="460" r="7" fill="#0a0a0a" stroke="#FF6B9D" stroke-width="1"/>
  </g>

  <!-- Node labels -->
  <text x="180" y="165" fill="#4ECDC4" font-size="10" text-anchor="middle" font-weight="600">NNTN</text>
  <text x="120" y="264" fill="#4ECDC4" font-size="8" text-anchor="middle">MBOX</text>
  <text x="300" y="224" fill="#4ECDC4" font-size="9" text-anchor="middle">FSTOCK</text>
  <text x="200" y="314" fill="#4ECDC4" font-size="7" text-anchor="middle">VC</text>

  <text x="500" y="134" fill="#FFCC00" font-size="10" text-anchor="middle" font-weight="600">Infra</text>
  <text x="600" y="204" fill="#FFCC00" font-size="8" text-anchor="middle">Deploy</text>
  <text x="420" y="204" fill="#FFCC00" font-size="8" text-anchor="middle">RAG</text>
  <text x="550" y="304" fill="#FFCC00" font-size="9" text-anchor="middle">Supabase</text>

  <text x="350" y="374" fill="#FF6B9D" font-size="9" text-anchor="middle">Session</text>
  <text x="450" y="424" fill="#FF6B9D" font-size="7" text-anchor="middle">Retro</text>

  <!-- Legend -->
  <g transform="translate(30, 30)">
    <circle cx="12" cy="0" r="6" fill="none" stroke="#4ECDC4" stroke-width="1.5"/>
    <text x="24" y="4" fill="#e0e0e0" font-size="11">Clients</text>
    <circle cx="102" cy="0" r="6" fill="none" stroke="#FFCC00" stroke-width="1.5"/>
    <text x="114" y="4" fill="#e0e0e0" font-size="11">Technical</text>
    <circle cx="210" cy="0" r="6" fill="none" stroke="#FF6B9D" stroke-width="1.5"/>
    <text x="222" y="4" fill="#e0e0e0" font-size="11">Sessions</text>
  </g>

  <!-- Title -->
  <text x="400" y="50" fill="#e0e0e0" font-size="20" text-anchor="middle" font-weight="700">Knowledge Graph Overview</text>

  <!-- Stats bar -->
  <g transform="translate(480, 460)">
    <rect x="0" y="-20" width="290" height="34" rx="17" fill="#FFCC0015" stroke="#FFCC0030" stroke-width="1"/>
    <text x="20" y="-1" fill="#FFCC00" font-size="14" font-weight="600">332 Nodes</text>
    <text x="140" y="-1" fill="#e0e0e080" font-size="14">|</text>
    <text x="160" y="-1" fill="#FFCC00" font-size="14" font-weight="600">1,602 Edges</text>
  </g>
</svg>