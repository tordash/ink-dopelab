<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&amp;display=swap');
      text { font-family: 'Kanit', sans-serif; }
    </style>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFCC00;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFCC00;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" fill="#e0e0e0" font-size="20" text-anchor="middle" font-weight="700">3 Steps to Build a Knowledge Graph</text>

  <!-- Step 1 -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="220" height="270" rx="12" fill="#0f0f0f" stroke="#FFCC0040" stroke-width="1"/>

    <!-- Step number -->
    <circle cx="110" cy="40" r="22" fill="#FFCC00" opacity="0.15"/>
    <text x="110" y="47" fill="#FFCC00" font-size="20" text-anchor="middle" font-weight="700">1</text>

    <!-- Title -->
    <text x="110" y="82" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="600">Extract [[wikilinks]]</text>

    <!-- Icon: document with links -->
    <g transform="translate(55, 100)">
      <rect x="0" y="0" width="100" height="70" rx="6" fill="none" stroke="#FFCC0050" stroke-width="1"/>
      <text x="10" y="20" fill="#666" font-size="9">Lorem ipsum...</text>
      <text x="10" y="36" fill="#4ECDC4" font-size="9">[[infrastructure]]</text>
      <text x="10" y="52" fill="#4ECDC4" font-size="9">[[cloudways]]</text>
      <text x="10" y="64" fill="#666" font-size="9">dolor sit amet</text>
    </g>

    <!-- Tool name -->
    <rect x="30" y="195" width="160" height="26" rx="13" fill="#FFCC0010" stroke="#FFCC0030" stroke-width="1"/>
    <text x="110" y="213" fill="#FFCC00" font-size="11" text-anchor="middle">extract-graph.py</text>

    <!-- Result -->
    <text x="110" y="250" fill="#e0e0e080" font-size="11" text-anchor="middle">332 nodes, 1,602 edges</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(262, 200)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#FFCC00" stroke-width="1.5" opacity="0.5"/>
    <polygon points="24,-5 34,0 24,5" fill="#FFCC00" opacity="0.5"/>
  </g>

  <!-- Step 2 -->
  <g transform="translate(290, 80)">
    <rect x="0" y="0" width="220" height="270" rx="12" fill="#0f0f0f" stroke="#4ECDC440" stroke-width="1"/>

    <!-- Step number -->
    <circle cx="110" cy="40" r="22" fill="#4ECDC4" opacity="0.15"/>
    <text x="110" y="47" fill="#4ECDC4" font-size="20" text-anchor="middle" font-weight="700">2</text>

    <!-- Title -->
    <text x="110" y="82" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="600">Embed to Vector Store</text>

    <!-- Icon: vector embeddings -->
    <g transform="translate(40, 100)">
      <rect x="0" y="0" width="140" height="70" rx="6" fill="none" stroke="#4ECDC450" stroke-width="1"/>
      <!-- Vector dots -->
      <circle cx="25" cy="20" r="4" fill="#4ECDC4" opacity="0.6"/>
      <circle cx="55" cy="35" r="4" fill="#4ECDC4" opacity="0.4"/>
      <circle cx="80" cy="15" r="4" fill="#4ECDC4" opacity="0.7"/>
      <circle cx="110" cy="45" r="4" fill="#4ECDC4" opacity="0.5"/>
      <circle cx="40" cy="50" r="4" fill="#4ECDC4" opacity="0.3"/>
      <circle cx="95" cy="55" r="4" fill="#4ECDC4" opacity="0.6"/>
      <circle cx="120" cy="25" r="4" fill="#4ECDC4" opacity="0.4"/>
      <!-- Cluster circle -->
      <circle cx="70" cy="35" r="30" fill="none" stroke="#4ECDC4" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
    </g>

    <!-- Tool names -->
    <rect x="15" y="190" width="90" height="26" rx="13" fill="#4ECDC410" stroke="#4ECDC430" stroke-width="1"/>
    <text x="60" y="208" fill="#4ECDC4" font-size="10" text-anchor="middle">ChromaDB</text>
    <rect x="115" y="190" width="90" height="26" rx="13" fill="#4ECDC410" stroke="#4ECDC430" stroke-width="1"/>
    <text x="160" y="208" fill="#4ECDC4" font-size="10" text-anchor="middle">bge-m3</text>

    <!-- Result -->
    <text x="110" y="250" fill="#e0e0e080" font-size="11" text-anchor="middle">2,456 documents embedded</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(512, 200)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#FFCC00" stroke-width="1.5" opacity="0.5"/>
    <polygon points="24,-5 34,0 24,5" fill="#FFCC00" opacity="0.5"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="220" height="270" rx="12" fill="#0f0f0f" stroke="#FF6B9D40" stroke-width="1"/>

    <!-- Step number -->
    <circle cx="110" cy="40" r="22" fill="#FF6B9D" opacity="0.15"/>
    <text x="110" y="47" fill="#FF6B9D" font-size="20" text-anchor="middle" font-weight="700">3</text>

    <!-- Title -->
    <text x="110" y="82" fill="#e0e0e0" font-size="14" text-anchor="middle" font-weight="600">Graph-enhanced Search</text>

    <!-- Icon: search with graph expansion -->
    <g transform="translate(40, 100)">
      <rect x="0" y="0" width="140" height="70" rx="6" fill="none" stroke="#FF6B9D50" stroke-width="1"/>
      <!-- Center search result -->
      <circle cx="70" cy="35" r="12" fill="#FF6B9D" opacity="0.2" stroke="#FF6B9D" stroke-width="1.5"/>
      <text x="70" y="39" fill="#FF6B9D" font-size="10" text-anchor="middle" font-weight="600">Q</text>
      <!-- Expansion rings -->
      <circle cx="70" cy="35" r="24" fill="none" stroke="#FF6B9D" stroke-width="0.5" opacity="0.4"/>
      <!-- Neighbor nodes -->
      <circle cx="35" cy="20" r="5" fill="#FFCC00" opacity="0.4"/>
      <circle cx="105" cy="20" r="5" fill="#4ECDC4" opacity="0.4"/>
      <circle cx="45" cy="55" r="5" fill="#4ECDC4" opacity="0.4"/>
      <circle cx="95" cy="55" r="5" fill="#FFCC00" opacity="0.4"/>
      <!-- Lines to neighbors -->
      <line x1="60" y1="28" x2="38" y2="22" stroke="#FFCC0040" stroke-width="0.8"/>
      <line x1="80" y1="28" x2="102" y2="22" stroke="#4ECDC440" stroke-width="0.8"/>
      <line x1="62" y1="44" x2="48" y2="53" stroke="#4ECDC440" stroke-width="0.8"/>
      <line x1="78" y1="44" x2="92" y2="53" stroke="#FFCC0040" stroke-width="0.8"/>
    </g>

    <!-- Tool name -->
    <rect x="30" y="195" width="160" height="26" rx="13" fill="#FF6B9D10" stroke="#FF6B9D30" stroke-width="1"/>
    <text x="110" y="213" fill="#FF6B9D" font-size="11" text-anchor="middle">graph-search.py</text>

    <!-- Result -->
    <text x="110" y="250" fill="#e0e0e080" font-size="11" text-anchor="middle">Vector + Neighbors</text>
  </g>

  <!-- Bottom label -->
  <text x="400" y="385" fill="#e0e0e050" font-size="11" text-anchor="middle">Obsidian [[wikilinks]] → ChromaDB/bge-m3 → Graph-enhanced RAG</text>
</svg>