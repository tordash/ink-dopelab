<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&amp;display=swap');
      text { font-family: 'Kanit', sans-serif; }
    </style>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FFCC00" opacity="0.6"/>
    </marker>
    <marker id="arrowHeadCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ECDC4" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" fill="#e0e0e0" font-size="20" text-anchor="middle" font-weight="700">Architecture: Data Flow</text>

  <!-- Layer 1: Source (left) -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="140" height="140" rx="10" fill="#0f0f0f" stroke="#FFCC0040" stroke-width="1.5"/>
    <text x="70" y="28" fill="#FFCC00" font-size="13" text-anchor="middle" font-weight="600">Obsidian</text>
    <text x="70" y="46" fill="#e0e0e060" font-size="10" text-anchor="middle">brain/</text>

    <!-- Mini folder structure -->
    <g transform="translate(20, 58)">
      <text x="0" y="0" fill="#666" font-size="9">Episodic/</text>
      <text x="0" y="16" fill="#666" font-size="9">Semantic/</text>
      <text x="0" y="32" fill="#666" font-size="9">Procedural/</text>
      <text x="0" y="48" fill="#666" font-size="9">Meta/</text>
    </g>

    <rect x="15" y="115" width="110" height="18" rx="9" fill="#FFCC0010" stroke="#FFCC0025" stroke-width="0.5"/>
    <text x="70" y="128" fill="#FFCC00" font-size="9" text-anchor="middle">450+ Markdown files</text>
  </g>

  <!-- Layer 2: Processing (center-left) -->
  <g transform="translate(220, 70)">
    <rect x="0" y="0" width="150" height="140" rx="10" fill="#0f0f0f" stroke="#4ECDC440" stroke-width="1.5"/>
    <text x="75" y="28" fill="#4ECDC4" font-size="13" text-anchor="middle" font-weight="600">Processing</text>

    <!-- Tools list -->
    <g transform="translate(15, 44)">
      <rect x="0" y="0" width="120" height="22" rx="4" fill="#4ECDC410"/>
      <text x="60" y="15" fill="#4ECDC4" font-size="9" text-anchor="middle">extract-graph.py</text>

      <rect x="0" y="28" width="120" height="22" rx="4" fill="#4ECDC410"/>
      <text x="60" y="43" fill="#4ECDC4" font-size="9" text-anchor="middle">embed-brain.py</text>

      <rect x="0" y="56" width="120" height="22" rx="4" fill="#4ECDC410"/>
      <text x="60" y="71" fill="#4ECDC4" font-size="9" text-anchor="middle">embed-nntn-menus.py</text>
    </g>

    <rect x="15" y="115" width="120" height="18" rx="9" fill="#4ECDC410" stroke="#4ECDC425" stroke-width="0.5"/>
    <text x="75" y="128" fill="#4ECDC4" font-size="9" text-anchor="middle">bge-m3 embeddings</text>
  </g>

  <!-- Layer 3: Storage (center-right) -->
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="160" height="160" rx="10" fill="#0f0f0f" stroke="#FF6B9D40" stroke-width="1.5"/>
    <text x="80" y="28" fill="#FF6B9D" font-size="13" text-anchor="middle" font-weight="600">ChromaDB</text>

    <!-- Collections -->
    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="130" height="28" rx="6" fill="#FF6B9D10" stroke="#FF6B9D25" stroke-width="0.5"/>
      <text x="65" y="12" fill="#FF6B9D" font-size="9" text-anchor="middle" font-weight="600">brain_knowledge</text>
      <text x="65" y="23" fill="#e0e0e050" font-size="8" text-anchor="middle">1,800+ docs</text>

      <rect x="0" y="34" width="130" height="28" rx="6" fill="#FF6B9D10" stroke="#FF6B9D25" stroke-width="0.5"/>
      <text x="65" y="46" fill="#FF6B9D" font-size="9" text-anchor="middle" font-weight="600">nntn_menus</text>
      <text x="65" y="57" fill="#e0e0e050" font-size="8" text-anchor="middle">340+ docs</text>

      <rect x="0" y="68" width="130" height="28" rx="6" fill="#FF6B9D10" stroke="#FF6B9D25" stroke-width="0.5"/>
      <text x="65" y="80" fill="#FF6B9D" font-size="9" text-anchor="middle" font-weight="600">client_data</text>
      <text x="65" y="91" fill="#e0e0e050" font-size="8" text-anchor="middle">300+ docs</text>
    </g>

    <rect x="15" y="135" width="130" height="18" rx="9" fill="#FF6B9D10" stroke="#FF6B9D25" stroke-width="0.5"/>
    <text x="80" y="148" fill="#FF6B9D" font-size="9" text-anchor="middle">2,456 total documents</text>
  </g>

  <!-- Layer 4: Search (right) -->
  <g transform="translate(630, 70)">
    <rect x="0" y="0" width="140" height="140" rx="10" fill="#0f0f0f" stroke="#FFCC0060" stroke-width="2"/>
    <text x="70" y="28" fill="#FFCC00" font-size="13" text-anchor="middle" font-weight="700">rag CLI</text>

    <!-- Search modes -->
    <g transform="translate(15, 42)">
      <text x="0" y="0" fill="#e0e0e0" font-size="9">rag search</text>
      <text x="0" y="18" fill="#e0e0e0" font-size="9">rag brain</text>
      <text x="0" y="36" fill="#e0e0e0" font-size="9">rag graph</text>
      <text x="0" y="54" fill="#e0e0e0" font-size="9">rag hybrid</text>
      <text x="0" y="72" fill="#e0e0e0" font-size="9">rag neighbors</text>
    </g>
  </g>

  <!-- Arrows: Source → Processing -->
  <line x1="172" y1="140" x2="218" y2="140" stroke="#FFCC00" stroke-width="1.5" marker-end="url(#arrowHead)" opacity="0.6"/>

  <!-- Arrows: Processing → Storage -->
  <line x1="372" y1="140" x2="418" y2="140" stroke="#4ECDC4" stroke-width="1.5" marker-end="url(#arrowHeadCyan)" opacity="0.6"/>

  <!-- Arrows: Storage → Search -->
  <line x1="582" y1="140" x2="628" y2="140" stroke="#FF6B9D" stroke-width="1.5" opacity="0.6"/>
  <polygon points="628,135 638,140 628,145" fill="#FF6B9D" opacity="0.6"/>

  <!-- Knowledge Graph overlay -->
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="400" height="140" rx="10" fill="#0f0f0f" stroke="#FFCC0025" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="200" y="24" fill="#FFCC00" font-size="12" text-anchor="middle" font-weight="600">Knowledge Graph Layer</text>

    <!-- Mini graph -->
    <g transform="translate(100, 40)">
      <line x1="40" y1="30" x2="100" y2="30" stroke="#FFCC0030" stroke-width="1"/>
      <line x1="100" y1="30" x2="160" y2="30" stroke="#FFCC0030" stroke-width="1"/>
      <line x1="40" y1="30" x2="70" y2="70" stroke="#FFCC0030" stroke-width="1"/>
      <line x1="100" y1="30" x2="70" y2="70" stroke="#FFCC0030" stroke-width="1"/>
      <line x1="100" y1="30" x2="130" y2="70" stroke="#FFCC0030" stroke-width="1"/>
      <line x1="160" y1="30" x2="130" y2="70" stroke="#FFCC0030" stroke-width="1"/>
      <line x1="70" y1="70" x2="130" y2="70" stroke="#FFCC0030" stroke-width="1"/>

      <circle cx="40" cy="30" r="6" fill="#0f0f0f" stroke="#FFCC00" stroke-width="1.5"/>
      <circle cx="100" cy="30" r="8" fill="#0f0f0f" stroke="#FFCC00" stroke-width="2"/>
      <circle cx="160" cy="30" r="6" fill="#0f0f0f" stroke="#FFCC00" stroke-width="1.5"/>
      <circle cx="70" cy="70" r="5" fill="#0f0f0f" stroke="#4ECDC4" stroke-width="1"/>
      <circle cx="130" cy="70" r="5" fill="#0f0f0f" stroke="#4ECDC4" stroke-width="1"/>
    </g>

    <text x="200" y="128" fill="#e0e0e050" font-size="10" text-anchor="middle">332 nodes / 1,602 edges / wikilink-based</text>
  </g>

  <!-- Connecting dotted lines from graph layer to storage/search -->
  <line x1="500" y1="250" x2="500" y2="222" stroke="#FFCC0020" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="600" y1="280" x2="680" y2="212" stroke="#FFCC0020" stroke-width="1" stroke-dasharray="3,3"/>
</svg>