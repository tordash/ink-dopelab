<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&amp;display=swap');
      text { font-family: 'Kanit', sans-serif; }
    </style>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" fill="#e0e0e0" font-size="20" text-anchor="middle" font-weight="700">Search Comparison</text>
  <text x="400" y="58" fill="#e0e0e050" font-size="12" text-anchor="middle">Query: "ต้นทุนเมนู delivery"</text>

  <!-- Column 1: Grep (Keyword) -->
  <g transform="translate(25, 80)">
    <rect x="0" y="0" width="240" height="370" rx="10" fill="#0f0f0f" stroke="#FF6B6B30" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="240" height="50" rx="10" fill="#FF6B6B15"/>
    <text x="120" y="24" fill="#FF6B6B" font-size="15" text-anchor="middle" font-weight="700">grep</text>
    <text x="120" y="42" fill="#FF6B6B80" font-size="10" text-anchor="middle">Keyword Only</text>

    <!-- Search illustration -->
    <g transform="translate(20, 65)">
      <!-- Query bar -->
      <rect x="0" y="0" width="200" height="28" rx="14" fill="#FF6B6B10" stroke="#FF6B6B30" stroke-width="1"/>
      <text x="15" y="18" fill="#FF6B6B" font-size="10">"ต้นทุนเมนู delivery"</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 110)">
      <!-- Match 1 -->
      <rect x="0" y="0" width="200" height="40" rx="6" fill="#FF6B6B08" stroke="#FF6B6B20" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="8" fill="#FF6B6B30"/>
      <text x="16" y="24" fill="#FF6B6B" font-size="8" text-anchor="middle">1</text>
      <text x="32" y="15" fill="#e0e0e0" font-size="9">menu-delivery-cost.md</text>
      <text x="32" y="30" fill="#e0e0e040" font-size="8">exact keyword match</text>

      <!-- Match 2 -->
      <rect x="0" y="50" width="200" height="40" rx="6" fill="#FF6B6B08" stroke="#FF6B6B20" stroke-width="0.5"/>
      <circle cx="16" cy="70" r="8" fill="#FF6B6B30"/>
      <text x="16" y="74" fill="#FF6B6B" font-size="8" text-anchor="middle">2</text>
      <text x="32" y="65" fill="#e0e0e0" font-size="9">nntn-pricing.md</text>
      <text x="32" y="80" fill="#e0e0e040" font-size="8">has "เมนู" keyword</text>

      <!-- Empty / missed -->
      <g transform="translate(0, 110)">
        <rect x="0" y="0" width="200" height="40" rx="6" fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
        <text x="100" y="24" fill="#666" font-size="9" text-anchor="middle">ไม่เจอ (ไม่มี keyword ตรง)</text>
      </g>
      <g transform="translate(0, 160)">
        <rect x="0" y="0" width="200" height="40" rx="6" fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
        <text x="100" y="24" fill="#666" font-size="9" text-anchor="middle">ไม่เจอ (ไม่มี keyword ตรง)</text>
      </g>
    </g>

    <!-- Score -->
    <g transform="translate(30, 340)">
      <text x="90" y="0" fill="#FF6B6B" font-size="22" text-anchor="middle" font-weight="700">2</text>
      <text x="90" y="16" fill="#FF6B6B80" font-size="10" text-anchor="middle">results found</text>
    </g>
  </g>

  <!-- Column 2: Vector (Semantic) -->
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="240" height="370" rx="10" fill="#0f0f0f" stroke="#4ECDC430" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="240" height="50" rx="10" fill="#4ECDC415"/>
    <text x="120" y="24" fill="#4ECDC4" font-size="15" text-anchor="middle" font-weight="700">Vector Search</text>
    <text x="120" y="42" fill="#4ECDC480" font-size="10" text-anchor="middle">Semantic Similarity</text>

    <!-- Search illustration -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="200" height="28" rx="14" fill="#4ECDC410" stroke="#4ECDC430" stroke-width="1"/>
      <text x="15" y="18" fill="#4ECDC4" font-size="10">"ต้นทุนเมนู delivery"</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="200" height="40" rx="6" fill="#4ECDC408" stroke="#4ECDC420" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="8" fill="#4ECDC430"/>
      <text x="16" y="24" fill="#4ECDC4" font-size="8" text-anchor="middle">1</text>
      <text x="32" y="15" fill="#e0e0e0" font-size="9">menu-delivery-cost.md</text>
      <text x="32" y="30" fill="#e0e0e040" font-size="8">0.92 similarity</text>

      <rect x="0" y="50" width="200" height="40" rx="6" fill="#4ECDC408" stroke="#4ECDC420" stroke-width="0.5"/>
      <circle cx="16" cy="70" r="8" fill="#4ECDC430"/>
      <text x="16" y="74" fill="#4ECDC4" font-size="8" text-anchor="middle">2</text>
      <text x="32" y="65" fill="#e0e0e0" font-size="9">nntn-pricing.md</text>
      <text x="32" y="80" fill="#e0e0e040" font-size="8">0.87 similarity</text>

      <rect x="0" y="100" width="200" height="40" rx="6" fill="#4ECDC408" stroke="#4ECDC420" stroke-width="0.5"/>
      <circle cx="16" cy="120" r="8" fill="#4ECDC430"/>
      <text x="16" y="124" fill="#4ECDC4" font-size="8" text-anchor="middle">3</text>
      <text x="32" y="115" fill="#e0e0e0" font-size="9">food-cost-analysis.md</text>
      <text x="32" y="130" fill="#e0e0e040" font-size="8">0.81 similarity (semantic)</text>

      <!-- Missed -->
      <g transform="translate(0, 160)">
        <rect x="0" y="0" width="200" height="40" rx="6" fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
        <text x="100" y="24" fill="#666" font-size="9" text-anchor="middle">ไม่เจอ (ไม่อยู่ใน vector space)</text>
      </g>
    </g>

    <!-- Score -->
    <g transform="translate(30, 340)">
      <text x="90" y="0" fill="#4ECDC4" font-size="22" text-anchor="middle" font-weight="700">3</text>
      <text x="90" y="16" fill="#4ECDC480" font-size="10" text-anchor="middle">results found</text>
    </g>
  </g>

  <!-- Column 3: Graph-enhanced -->
  <g transform="translate(535, 80)">
    <rect x="0" y="0" width="240" height="370" rx="10" fill="#0f0f0f" stroke="#FFCC0050" stroke-width="1.5"/>

    <!-- Header -->
    <rect x="0" y="0" width="240" height="50" rx="10" fill="#FFCC0015"/>
    <text x="120" y="24" fill="#FFCC00" font-size="15" text-anchor="middle" font-weight="700">Graph-enhanced</text>
    <text x="120" y="42" fill="#FFCC0080" font-size="10" text-anchor="middle">Vector + Neighbors</text>

    <!-- Search illustration -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="200" height="28" rx="14" fill="#FFCC0010" stroke="#FFCC0030" stroke-width="1"/>
      <text x="15" y="18" fill="#FFCC00" font-size="10">"ต้นทุนเมนู delivery"</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="200" height="40" rx="6" fill="#FFCC0008" stroke="#FFCC0020" stroke-width="0.5"/>
      <circle cx="16" cy="20" r="8" fill="#FFCC0030"/>
      <text x="16" y="24" fill="#FFCC00" font-size="8" text-anchor="middle">1</text>
      <text x="32" y="15" fill="#e0e0e0" font-size="9">menu-delivery-cost.md</text>
      <text x="32" y="30" fill="#FFCC0060" font-size="8">vector match</text>

      <rect x="0" y="50" width="200" height="40" rx="6" fill="#FFCC0008" stroke="#FFCC0020" stroke-width="0.5"/>
      <circle cx="16" cy="70" r="8" fill="#FFCC0030"/>
      <text x="16" y="74" fill="#FFCC00" font-size="8" text-anchor="middle">2</text>
      <text x="32" y="65" fill="#e0e0e0" font-size="9">grab-lineman-commission.md</text>
      <text x="32" y="80" fill="#4ECDC4" font-size="8">graph neighbor</text>

      <rect x="0" y="100" width="200" height="40" rx="6" fill="#FFCC0008" stroke="#FFCC0020" stroke-width="0.5"/>
      <circle cx="16" cy="120" r="8" fill="#FFCC0030"/>
      <text x="16" y="124" fill="#FFCC00" font-size="8" text-anchor="middle">3</text>
      <text x="32" y="115" fill="#e0e0e0" font-size="9">raw-material-prices.md</text>
      <text x="32" y="130" fill="#4ECDC4" font-size="8">neighbor of neighbor</text>

      <rect x="0" y="150" width="200" height="40" rx="6" fill="#FFCC0008" stroke="#FFCC0020" stroke-width="0.5"/>
      <circle cx="16" cy="170" r="8" fill="#FFCC0030"/>
      <text x="16" y="174" fill="#FFCC00" font-size="8" text-anchor="middle">4</text>
      <text x="32" y="165" fill="#e0e0e0" font-size="9">food-cost-analysis.md</text>
      <text x="32" y="180" fill="#FFCC0060" font-size="8">vector + graph boost</text>

      <rect x="0" y="200" width="200" height="40" rx="6" fill="#FFCC0008" stroke="#FFCC0020" stroke-width="0.5"/>
      <circle cx="16" cy="220" r="8" fill="#FFCC0030"/>
      <text x="16" y="224" fill="#FFCC00" font-size="8" text-anchor="middle">5</text>
      <text x="32" y="215" fill="#e0e0e0" font-size="9">nntn-pricing.md</text>
      <text x="32" y="230" fill="#FFCC0060" font-size="8">vector match</text>
    </g>

    <!-- Score -->
    <g transform="translate(30, 340)">
      <text x="90" y="0" fill="#FFCC00" font-size="22" text-anchor="middle" font-weight="700">5</text>
      <text x="90" y="16" fill="#FFCC0080" font-size="10" text-anchor="middle">results found</text>
    </g>
  </g>

  <!-- Bottom comparison bar -->
  <g transform="translate(25, 460)">
    <rect x="0" y="-8" width="240" height="20" rx="10" fill="#FF6B6B15"/>
    <text x="120" y="6" fill="#FF6B6B" font-size="10" text-anchor="middle">keyword เท่านั้น</text>

    <rect x="255" y="-8" width="240" height="20" rx="10" fill="#4ECDC415"/>
    <text x="375" y="6" fill="#4ECDC4" font-size="10" text-anchor="middle">เข้าใจความหมาย</text>

    <rect x="510" y="-8" width="240" height="20" rx="10" fill="#FFCC0015"/>
    <text x="630" y="6" fill="#FFCC00" font-size="10" text-anchor="middle">เข้าใจ + เชื่อมโยง</text>
  </g>
</svg>