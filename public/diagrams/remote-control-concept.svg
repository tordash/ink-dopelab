<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"
     role="img" aria-labelledby="title desc">
  <title id="title">Remote Control Concept — วิธีทำงานของ Claude Code Remote Control</title>
  <desc id="desc">แผนภาพแสดงการเชื่อมต่อจากมือถือผ่าน QR Code ไปยัง Claude Code บนคอม และสั่งงาน AI Operating System</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4FC3F7"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad-phone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="grad-computer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="grad-ai" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>

  <style>
    .bg { fill: #0F0F1A; }
    .title-text { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 28px; font-weight: 700; fill: #EEEEEE; text-anchor: middle; }
    .subtitle-text { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 14px; font-weight: 400; fill: #888888; text-anchor: middle; }
    .node-label { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 18px; font-weight: 700; fill: #FFFFFF; text-anchor: middle; dominant-baseline: central; }
    .node-desc { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 13px; font-weight: 400; fill: #CCCCCC; text-anchor: middle; }
    .step-num { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; fill: #FFD54F; text-anchor: middle; }
    .connector { fill: none; stroke: #4FC3F7; stroke-width: 2.5; marker-end: url(#arrow); stroke-dasharray: 8 4; }
    .connector-solid { fill: none; stroke: #66BB6A; stroke-width: 2.5; marker-end: url(#arrow); }
    .icon-text { font-family: 'Inter', sans-serif; font-size: 36px; text-anchor: middle; dominant-baseline: central; }
    .analogy-box { fill: #1A1A2E; stroke: #333355; stroke-width: 1.5; rx: 12; }
    .analogy-text { font-family: 'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif; font-size: 14px; fill: #FFD54F; text-anchor: middle; font-style: italic; }
    .qr-box { fill: #1E1E30; stroke: #4FC3F7; stroke-width: 2; rx: 8; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Title -->
  <text class="title-text" x="600" y="50">Remote Control ทำงานยังไง?</text>
  <text class="subtitle-text" x="600" y="75">สั่งงาน AI จากมือถือ — เหมือนรีโมท TV</text>

  <!-- Step 1: Phone -->
  <g filter="url(#shadow)">
    <rect x="60" y="140" width="200" height="260" rx="20" fill="url(#grad-phone)" fill-opacity="0.15" stroke="#4FC3F7" stroke-width="2"/>
    <rect x="85" y="175" width="150" height="180" rx="4" fill="#0F0F1A" stroke="#4FC3F7" stroke-width="1" stroke-opacity="0.5"/>
  </g>
  <text class="step-num" x="160" y="130">STEP 1</text>
  <text class="icon-text" x="160" y="240" fill="#4FC3F7">📱</text>
  <text class="node-label" x="160" y="280">มือถือ</text>
  <text class="node-desc" x="160" y="310">สแกน QR</text>
  <text class="node-desc" x="160" y="330">จากที่ไหนก็ได้</text>
  <text class="node-desc" x="160" y="420" fill="#4FC3F7" font-size="11px" font-family="'Inter', sans-serif">= รีโมท</text>

  <!-- QR Code visual -->
  <g transform="translate(125, 190)">
    <rect width="70" height="70" rx="4" class="qr-box"/>
    <rect x="8" y="8" width="16" height="16" fill="#4FC3F7"/>
    <rect x="46" y="8" width="16" height="16" fill="#4FC3F7"/>
    <rect x="8" y="46" width="16" height="16" fill="#4FC3F7"/>
    <rect x="28" y="28" width="14" height="14" fill="#4FC3F7" fill-opacity="0.6"/>
    <rect x="46" y="46" width="16" height="16" fill="#4FC3F7" fill-opacity="0.4"/>
  </g>

  <!-- Connector 1: Phone to QR -->
  <path class="connector" d="M 264,270 H 370"/>

  <!-- Step 2: QR Connection -->
  <g filter="url(#shadow)">
    <circle cx="440" cy="270" r="70" fill="#1A1A2E" stroke="#FFD54F" stroke-width="2"/>
  </g>
  <text class="step-num" x="440" y="130">STEP 2</text>
  <text class="icon-text" x="440" y="250">🔗</text>
  <text class="node-label" x="440" y="285" font-size="15px">เชื่อมต่อ</text>
  <text class="node-desc" x="440" y="310">QR Code</text>
  <text class="node-desc" x="440" y="360" fill="#FFD54F" font-size="11px" font-family="'Inter', sans-serif">= สัญญาณ</text>

  <!-- Connector 2: QR to Computer -->
  <path class="connector-solid" d="M 514,270 H 620"/>

  <!-- Step 3: Computer (Claude Code) -->
  <g filter="url(#shadow)">
    <rect x="620" y="160" width="240" height="220" rx="16" fill="url(#grad-computer)" fill-opacity="0.15" stroke="#66BB6A" stroke-width="2"/>
    <!-- Monitor shape -->
    <rect x="650" y="185" width="180" height="120" rx="6" fill="#0F0F1A" stroke="#66BB6A" stroke-width="1.5"/>
    <!-- Monitor stand -->
    <rect x="720" y="305" width="40" height="15" fill="#66BB6A" fill-opacity="0.3"/>
    <rect x="700" y="315" width="80" height="6" rx="3" fill="#66BB6A" fill-opacity="0.3"/>
  </g>
  <text class="step-num" x="740" y="130">STEP 3</text>
  <!-- Terminal text inside monitor -->
  <text x="665" y="210" font-family="'Courier New', monospace" font-size="11px" fill="#66BB6A" fill-opacity="0.8">$ claude</text>
  <text x="665" y="228" font-family="'Courier New', monospace" font-size="11px" fill="#66BB6A" fill-opacity="0.6">▶ Running session...</text>
  <text x="665" y="246" font-family="'Courier New', monospace" font-size="11px" fill="#FFD54F" fill-opacity="0.8">⟩ Remote connected</text>
  <text x="665" y="264" font-family="'Courier New', monospace" font-size="11px" fill="#66BB6A" fill-opacity="0.6">⟩ Waiting for input</text>
  <text class="node-label" x="740" y="355">คอม (Claude Code)</text>
  <text class="node-desc" x="740" y="395" fill="#66BB6A" font-size="11px" font-family="'Inter', sans-serif">= TV</text>

  <!-- Connector 3: Computer to AI System -->
  <path class="connector-solid" d="M 864,270 H 940"/>

  <!-- Step 4: AI Operating System -->
  <g filter="url(#glow)">
    <rect x="940" y="140" width="220" height="260" rx="16" fill="url(#grad-ai)" fill-opacity="0.15" stroke="#FF7043" stroke-width="2"/>
  </g>
  <text class="step-num" x="1050" y="130">สั่งงาน</text>
  <text class="icon-text" x="1050" y="210">🤖</text>
  <text class="node-label" x="1050" y="250">AI Operating System</text>

  <!-- Sub-items of AI OS -->
  <rect x="965" y="275" width="170" height="30" rx="6" fill="#FF7043" fill-opacity="0.15" stroke="#FF7043" stroke-width="1"/>
  <text x="1050" y="295" font-family="'Sarabun', 'Inter', sans-serif" font-size="12px" fill="#FF7043" text-anchor="middle">📊 ดึง Reports</text>

  <rect x="965" y="315" width="170" height="30" rx="6" fill="#FF7043" fill-opacity="0.15" stroke="#FF7043" stroke-width="1"/>
  <text x="1050" y="335" font-family="'Sarabun', 'Inter', sans-serif" font-size="12px" fill="#FF7043" text-anchor="middle">💬 ตอบ Leads</text>

  <rect x="965" y="355" width="170" height="30" rx="6" fill="#FF7043" fill-opacity="0.15" stroke="#FF7043" stroke-width="1"/>
  <text x="1050" y="375" font-family="'Sarabun', 'Inter', sans-serif" font-size="12px" fill="#FF7043" text-anchor="middle">📝 สร้าง Proposals</text>

  <!-- Bottom analogy bar -->
  <rect x="60" y="460" width="1100" height="80" class="analogy-box"/>
  <text class="analogy-text" x="600" y="495">💡 "Remote Control มันไร้ค่า ถ้าไม่มี TV ให้ชี้"</text>
  <text x="600" y="520" font-family="'Sarabun', 'Noto Sans Thai', 'Inter', sans-serif" font-size="12px" fill="#888888" text-anchor="middle">รีโมทแค่เป็นตัวส่ง — AI Operating System ที่สร้างไว้ข้างหลัง ต่างหากที่เป็น value จริง</text>

  <!-- Decorative dots -->
  <circle cx="340" cy="270" r="3" fill="#4FC3F7" fill-opacity="0.5"/>
  <circle cx="350" cy="270" r="3" fill="#4FC3F7" fill-opacity="0.7"/>
  <circle cx="360" cy="270" r="3" fill="#4FC3F7" fill-opacity="0.9"/>
  <circle cx="910" cy="270" r="3" fill="#66BB6A" fill-opacity="0.5"/>
  <circle cx="920" cy="270" r="3" fill="#66BB6A" fill-opacity="0.7"/>
  <circle cx="930" cy="270" r="3" fill="#66BB6A" fill-opacity="0.9"/>
</svg>