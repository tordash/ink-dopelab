<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Kanit', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <text x="600" y="55" text-anchor="middle" fill="#FFCC00" font-size="22" font-weight="700">Content Creator Pipeline with Playwright</text>
  <text x="600" y="80" text-anchor="middle" fill="#888" font-size="13">จาก JSON config สู่ video episodes อัตโนมัติ</text>

  <!-- Input: JSON Config -->
  <rect x="50" y="130" width="180" height="180" rx="16" fill="#1a2a1a" stroke="#27AE60" stroke-width="2"/>
  <text x="140" y="175" text-anchor="middle" fill="#27AE60" font-size="32">{ }</text>
  <text x="140" y="210" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Episodes JSON</text>
  <text x="140" y="235" text-anchor="middle" fill="#aaa" font-size="11">ep1-setup</text>
  <text x="140" y="252" text-anchor="middle" fill="#aaa" font-size="11">ep2-first-project</text>
  <text x="140" y="269" text-anchor="middle" fill="#aaa" font-size="11">ep3-advanced</text>
  <text x="140" y="286" text-anchor="middle" fill="#666" font-size="11">steps: goto, fill, click</text>

  <!-- Arrow -->
  <line x1="230" y1="220" x2="300" y2="220" stroke="#FFCC00" stroke-width="2"/>
  <polygon points="300,215 312,220 300,225" fill="#FFCC00"/>

  <!-- Playwright Engine -->
  <rect x="310" y="120" width="260" height="200" rx="16" fill="#1e1e3a" stroke="#FFCC00" stroke-width="2.5"/>
  <text x="440" y="165" text-anchor="middle" fill="#FFCC00" font-size="18" font-weight="700">Playwright Engine</text>
  <line x1="340" y1="178" x2="540" y2="178" stroke="#333" stroke-width="1"/>

  <rect x="330" y="192" width="220" height="32" rx="6" fill="#2a2a4a"/>
  <circle cx="350" cy="208" r="6" fill="#e74c3c">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="365" y="213" fill="#e74c3c" font-size="12" font-weight="600">REC</text>
  <text x="415" y="213" fill="#aaa" font-size="11">Recording context active</text>

  <text x="350" y="250" fill="#888" font-size="12">&#x2714; chromium.launch()</text>
  <text x="350" y="270" fill="#888" font-size="12">&#x2714; recordVideo: { dir, size }</text>
  <text x="350" y="290" fill="#888" font-size="12">&#x2714; for (step of steps) execute</text>
  <text x="350" y="310" fill="#888" font-size="12">&#x2714; context.close() → flush</text>

  <!-- Arrow -->
  <line x1="570" y1="220" x2="640" y2="220" stroke="#FFCC00" stroke-width="2"/>
  <polygon points="640,215 652,220 640,225" fill="#FFCC00"/>

  <!-- Output: Video Files -->
  <rect x="660" y="110" width="240" height="230" rx="16" fill="#1e1e3a" stroke="#FF6B35" stroke-width="2"/>
  <text x="780" y="150" text-anchor="middle" fill="#FF6B35" font-size="16" font-weight="700">Output per Episode</text>
  <line x1="680" y1="162" x2="880" y2="162" stroke="#333" stroke-width="1"/>

  <rect x="680" y="175" width="200" height="35" rx="8" fill="#2a1a1a"/>
  <text x="780" y="198" text-anchor="middle" fill="#FF6B35" font-size="13">/ep1-setup/video.webm</text>

  <rect x="680" y="218" width="200" height="35" rx="8" fill="#2a1a1a"/>
  <text x="780" y="241" text-anchor="middle" fill="#FF6B35" font-size="13">/ep2-first-project/video.webm</text>

  <rect x="680" y="261" width="200" height="35" rx="8" fill="#2a1a1a"/>
  <text x="780" y="284" text-anchor="middle" fill="#FF6B35" font-size="13">/ep3-advanced/video.webm</text>

  <text x="780" y="320" text-anchor="middle" fill="#666" font-size="11">+ thumbnail.png each</text>

  <!-- Arrow to ffmpeg -->
  <line x1="900" y1="220" x2="950" y2="220" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="950,215 962,220 950,225" fill="#9b59b6"/>

  <!-- ffmpeg -->
  <rect x="960" y="140" width="190" height="160" rx="16" fill="#1e1e3a" stroke="#9b59b6" stroke-width="2"/>
  <text x="1055" y="180" text-anchor="middle" fill="#9b59b6" font-size="15" font-weight="700">Post-Process</text>
  <line x1="980" y1="192" x2="1130" y2="192" stroke="#333" stroke-width="1"/>
  <text x="1055" y="215" text-anchor="middle" fill="#aaa" font-size="12">ffmpeg .webm → .mp4</text>
  <text x="1055" y="238" text-anchor="middle" fill="#aaa" font-size="12">+ fade in/out</text>
  <text x="1055" y="261" text-anchor="middle" fill="#aaa" font-size="12">+ trim + concat</text>
  <text x="1055" y="284" text-anchor="middle" fill="#27AE60" font-size="12" font-weight="600">Social-ready &#x2714;</text>

  <!-- Bottom: Benefits -->
  <rect x="100" y="400" width="1000" height="130" rx="16" fill="#111122" stroke="#333" stroke-width="1"/>
  <text x="600" y="435" text-anchor="middle" fill="#FFCC00" font-size="16" font-weight="600">Why This Approach?</text>

  <text x="250" y="470" text-anchor="middle" fill="#27AE60" font-size="14" font-weight="600">&#x2714; Reproducible</text>
  <text x="250" y="490" text-anchor="middle" fill="#888" font-size="12">รัน script เดิม ได้ผลเดิม</text>

  <text x="500" y="470" text-anchor="middle" fill="#27AE60" font-size="14" font-weight="600">&#x2714; Batch Production</text>
  <text x="500" y="490" text-anchor="middle" fill="#888" font-size="12">5 episodes, 1 command</text>

  <text x="750" y="470" text-anchor="middle" fill="#27AE60" font-size="14" font-weight="600">&#x2714; Version Control</text>
  <text x="750" y="490" text-anchor="middle" fill="#888" font-size="12">Git track ทุก script change</text>

  <text x="1000" y="470" text-anchor="middle" fill="#27AE60" font-size="14" font-weight="600">&#x2714; No OBS Needed</text>
  <text x="1000" y="490" text-anchor="middle" fill="#888" font-size="12">Headless = no manual work</text>

  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" fill="#555" font-size="12">DopeLab.Studio</text>
</svg>
