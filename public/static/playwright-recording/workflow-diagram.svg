<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Kanit', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#FFCC00" font-size="24" font-weight="700" opacity="0.9">Playwright Video Recording Workflow</text>

  <!-- Step 1: Launch Browser -->
  <rect x="60" y="120" width="200" height="120" rx="16" fill="#1e1e3a" stroke="#FFCC00" stroke-width="2"/>
  <text x="160" y="165" text-anchor="middle" fill="#FFCC00" font-size="28">&#x1F310;</text>
  <text x="160" y="195" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Launch Browser</text>
  <text x="160" y="218" text-anchor="middle" fill="#aaa" font-size="12">chromium.launch()</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="180" x2="320" y2="180" stroke="#FFCC00" stroke-width="2" opacity="0.7"/>
  <polygon points="320,175 330,180 320,185" fill="#FFCC00" opacity="0.7"/>

  <!-- Step 2: Create Context -->
  <rect x="330" y="120" width="200" height="120" rx="16" fill="#1e1e3a" stroke="#FFCC00" stroke-width="2"/>
  <text x="430" y="165" text-anchor="middle" fill="#FFCC00" font-size="28">&#x1F3AC;</text>
  <text x="430" y="195" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Create Context</text>
  <text x="430" y="218" text-anchor="middle" fill="#aaa" font-size="12">recordVideo: { dir, size }</text>

  <!-- Arrow 2 -->
  <line x1="530" y1="180" x2="590" y2="180" stroke="#FFCC00" stroke-width="2" opacity="0.7"/>
  <polygon points="590,175 600,180 590,185" fill="#FFCC00" opacity="0.7"/>

  <!-- Step 3: Actions -->
  <rect x="600" y="120" width="200" height="120" rx="16" fill="#1e1e3a" stroke="#27AE60" stroke-width="2"/>
  <text x="700" y="165" text-anchor="middle" fill="#27AE60" font-size="28">&#x2699;&#xFE0F;</text>
  <text x="700" y="195" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Run Actions</text>
  <text x="700" y="218" text-anchor="middle" fill="#aaa" font-size="12">goto, click, fill, wait</text>

  <!-- Arrow 3 -->
  <line x1="800" y1="180" x2="860" y2="180" stroke="#FFCC00" stroke-width="2" opacity="0.7"/>
  <polygon points="860,175 870,180 860,185" fill="#FFCC00" opacity="0.7"/>

  <!-- Step 4: Close Context -->
  <rect x="870" y="120" width="200" height="120" rx="16" fill="#1e1e3a" stroke="#FF6B35" stroke-width="2"/>
  <text x="970" y="165" text-anchor="middle" fill="#FF6B35" font-size="28">&#x1F4BE;</text>
  <text x="970" y="195" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Close Context</text>
  <text x="970" y="218" text-anchor="middle" fill="#aaa" font-size="12">flush video to .webm</text>

  <!-- Recording indicator bar -->
  <rect x="60" y="290" width="1010" height="50" rx="12" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
  <circle cx="90" cy="315" r="8" fill="#e74c3c">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="110" y="321" fill="#e74c3c" font-size="14" font-weight="600">REC</text>
  <text x="170" y="321" fill="#888" font-size="13">Video is recording all browser actions automatically...</text>
  <rect x="800" y="300" width="260" height="30" rx="6" fill="#1a3a1a" stroke="#27AE60" stroke-width="1"/>
  <text x="930" y="320" text-anchor="middle" fill="#27AE60" font-size="12">&#x2714; Every action captured in .webm</text>

  <!-- Output section -->
  <text x="600" y="390" text-anchor="middle" fill="#FFCC00" font-size="18" font-weight="600">Output Files</text>

  <!-- Output 1: webm -->
  <rect x="150" y="420" width="240" height="100" rx="12" fill="#1e1e3a" stroke="#555" stroke-width="1"/>
  <text x="270" y="460" text-anchor="middle" fill="#FFCC00" font-size="20" font-weight="700">.webm</text>
  <text x="270" y="482" text-anchor="middle" fill="#aaa" font-size="13">Default output format</text>
  <text x="270" y="500" text-anchor="middle" fill="#666" font-size="11">VP8 codec, good quality</text>

  <!-- Arrow to mp4 -->
  <line x1="390" y1="470" x2="460" y2="470" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="460,465 470,470 460,475" fill="#FF6B35"/>
  <text x="425" y="460" text-anchor="middle" fill="#FF6B35" font-size="11">ffmpeg</text>

  <!-- Output 2: mp4 -->
  <rect x="470" y="420" width="240" height="100" rx="12" fill="#1e1e3a" stroke="#27AE60" stroke-width="1"/>
  <text x="590" y="460" text-anchor="middle" fill="#27AE60" font-size="20" font-weight="700">.mp4</text>
  <text x="590" y="482" text-anchor="middle" fill="#aaa" font-size="13">Social media ready</text>
  <text x="590" y="500" text-anchor="middle" fill="#666" font-size="11">H.264, FB/IG compatible</text>

  <!-- Output 3: screenshot -->
  <rect x="790" y="420" width="240" height="100" rx="12" fill="#1e1e3a" stroke="#555" stroke-width="1"/>
  <text x="910" y="460" text-anchor="middle" fill="#9b59b6" font-size="20" font-weight="700">.png</text>
  <text x="910" y="482" text-anchor="middle" fill="#aaa" font-size="13">Screenshot / Thumbnail</text>
  <text x="910" y="500" text-anchor="middle" fill="#666" font-size="11">page.screenshot()</text>

  <!-- Footer -->
  <text x="600" y="590" text-anchor="middle" fill="#555" font-size="12">DopeLab.Studio</text>
  <line x1="100" y1="570" x2="1100" y2="570" stroke="#333" stroke-width="0.5"/>
</svg>
