<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Kanit', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg-3" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="savings" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-3)"/>

  <!-- Subtle grid decoration -->
  <g opacity="0.06" stroke="#FFCC00" stroke-width="0.5">
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>

  <!-- Ambient orbs -->
  <circle cx="150" cy="480" r="140" fill="#FFCC00" opacity="0.04" filter="url(#glow3)"/>
  <circle cx="1050" cy="180" r="120" fill="#64ffda" opacity="0.05" filter="url(#glow3)"/>

  <!-- Category badge -->
  <rect x="50" y="50" width="10" height="50" rx="5" fill="#FFCC00"/>
  <text x="80" y="80" fill="#ffffff" font-size="28" font-weight="700">Projects + Cache</text>
  <text x="80" y="110" fill="#aaaaaa" font-size="15">ประหยัดได้ 90% สำหรับเอกสารที่ใช้ซ้ำ · Anthropic Prompt Caching</text>
  <line x1="80" y1="135" x2="420" y2="135" stroke="#FFCC00" stroke-width="2" opacity="0.5"/>

  <!-- LEFT: Without cache -->
  <g>
    <rect x="80" y="180" width="460" height="330" rx="14" fill="#15152a" stroke="#3a1f1f" stroke-width="1.5"/>
    <text x="110" y="215" fill="#ff6b6b" font-size="13" font-weight="600" letter-spacing="2">WITHOUT CACHE</text>
    <text x="110" y="248" fill="#ffffff" font-size="22" font-weight="700">โหลด docs ทุกแชท</text>
    <text x="110" y="274" fill="#888" font-size="13">ทุก conversation = re-send context ซ้ำ</text>

    <!-- 4 stacked doc loads -->
    <g font-family="'Space Mono', monospace" font-size="12">
      <rect x="110" y="300" width="400" height="34" rx="6" fill="#2a1818" stroke="#4a2828"/>
      <text x="128" y="322" fill="#ff6b6b">Chat #1</text>
      <text x="210" y="322" fill="#888">→</text>
      <text x="230" y="322" fill="#ccc">load 10,000 tokens</text>
      <text x="490" y="322" fill="#ff6b6b" text-anchor="end">1.0×</text>

      <rect x="110" y="344" width="400" height="34" rx="6" fill="#2a1818" stroke="#4a2828"/>
      <text x="128" y="366" fill="#ff6b6b">Chat #2</text>
      <text x="210" y="366" fill="#888">→</text>
      <text x="230" y="366" fill="#ccc">load 10,000 tokens</text>
      <text x="490" y="366" fill="#ff6b6b" text-anchor="end">2.0×</text>

      <rect x="110" y="388" width="400" height="34" rx="6" fill="#2a1818" stroke="#4a2828"/>
      <text x="128" y="410" fill="#ff6b6b">Chat #3</text>
      <text x="210" y="410" fill="#888">→</text>
      <text x="230" y="410" fill="#ccc">load 10,000 tokens</text>
      <text x="490" y="410" fill="#ff6b6b" text-anchor="end">3.0×</text>

      <rect x="110" y="432" width="400" height="34" rx="6" fill="#2a1818" stroke="#4a2828"/>
      <text x="128" y="454" fill="#ff6b6b">Chat #4</text>
      <text x="210" y="454" fill="#888">→</text>
      <text x="230" y="454" fill="#ccc">load 10,000 tokens</text>
      <text x="490" y="454" fill="#ff6b6b" text-anchor="end">4.0×</text>
    </g>

    <text x="110" y="494" fill="#ff6b6b" font-size="15" font-weight="700">Total: 40,000 tokens</text>
  </g>

  <!-- Arrow divider -->
  <g>
    <text x="600" y="350" fill="#FFCC00" font-size="34" text-anchor="middle" font-weight="700">→</text>
  </g>

  <!-- RIGHT: With cache -->
  <g>
    <rect x="660" y="180" width="460" height="330" rx="14" fill="#15152a" stroke="#1f3a3a" stroke-width="1.5"/>
    <text x="690" y="215" fill="#64ffda" font-size="13" font-weight="600" letter-spacing="2">WITH PROJECTS + CACHE</text>
    <text x="690" y="248" fill="#ffffff" font-size="22" font-weight="700">โหลดครั้งเดียว · re-use</text>
    <text x="690" y="274" fill="#888" font-size="13">Project = shared context ที่ cache อัตโนมัติ</text>

    <!-- Initial load -->
    <g font-family="'Space Mono', monospace" font-size="12">
      <rect x="690" y="300" width="400" height="34" rx="6" fill="#14292a" stroke="#1f4a4a"/>
      <text x="708" y="322" fill="#64ffda">Upload once</text>
      <text x="810" y="322" fill="#888">→</text>
      <text x="830" y="322" fill="#ccc">load 10,000 tokens</text>
      <text x="1070" y="322" fill="#64ffda" text-anchor="end">1.0×</text>

      <!-- Cache hits -->
      <rect x="690" y="344" width="400" height="34" rx="6" fill="#14292a" stroke="#1f4a4a" opacity="0.85"/>
      <text x="708" y="366" fill="#64ffda">Chat #2</text>
      <text x="810" y="366" fill="#888">→</text>
      <text x="830" y="366" fill="#64ffda">cache hit (90% off)</text>
      <text x="1070" y="366" fill="#64ffda" text-anchor="end">+0.1×</text>

      <rect x="690" y="388" width="400" height="34" rx="6" fill="#14292a" stroke="#1f4a4a" opacity="0.75"/>
      <text x="708" y="410" fill="#64ffda">Chat #3</text>
      <text x="810" y="410" fill="#888">→</text>
      <text x="830" y="410" fill="#64ffda">cache hit (90% off)</text>
      <text x="1070" y="410" fill="#64ffda" text-anchor="end">+0.1×</text>

      <rect x="690" y="432" width="400" height="34" rx="6" fill="#14292a" stroke="#1f4a4a" opacity="0.65"/>
      <text x="708" y="454" fill="#64ffda">Chat #4</text>
      <text x="810" y="454" fill="#888">→</text>
      <text x="830" y="454" fill="#64ffda">cache hit (90% off)</text>
      <text x="1070" y="454" fill="#64ffda" text-anchor="end">+0.1×</text>
    </g>

    <text x="690" y="494" fill="#64ffda" font-size="15" font-weight="700">Total: 13,000 tokens</text>
  </g>

  <!-- Bottom savings callout -->
  <g>
    <rect x="80" y="530" width="1040" height="42" rx="8" fill="#0f0f1e" stroke="#FFCC00" stroke-width="1" opacity="0.9"/>
    <text x="120" y="558" fill="#aaa" font-size="14">ประหยัด</text>
    <text x="200" y="560" fill="url(#savings)" font-size="26" font-weight="800">67.5% tokens</text>
    <text x="420" y="558" fill="#666" font-size="14">·</text>
    <text x="445" y="558" fill="#aaa" font-size="14">Anthropic cache discount</text>
    <text x="690" y="560" fill="#FFCC00" font-size="24" font-weight="800">90%</text>
    <text x="750" y="558" fill="#aaa" font-size="14">ต่อ cached block</text>
    <text x="990" y="558" fill="#666" font-size="13" text-anchor="end">Anthropic docs, 2026</text>
    <text x="1100" y="558" fill="#64ffda" font-size="14" text-anchor="end">✨</text>
  </g>

  <!-- Footer -->
  <line x1="80" y1="595" x2="1120" y2="595" stroke="#222" stroke-width="0.5"/>
  <text x="600" y="618" text-anchor="middle" fill="#444" font-size="11">DopeLab.Studio — ink.dopelab.studio</text>
</svg>
