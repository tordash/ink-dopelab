  <rect x="45" y="553" width="1110" height="34" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Arrow 1 -->
  <text x="65" y="575" font-size="11" fill="#636980">Pro → Max 5x เมื่อ:</text>
  <text x="190" y="575" font-size="11" fill="#c8ccd4">limit หมดทุกวัน หรือต้องการ Opus</text>
  <!-- Divider -->
  <line x1="600" y1="558" x2="600" y2="582" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Arrow 2 -->
  <text x="618" y="575" font-size="11" fill="#636980">Max 5x → 20x เมื่อ:</text>
  <text x="755" y="575" font-size="11" fill="#c8ccd4">ใช้ Claude Code ทั้งวัน (8h+/วัน) หรือ bill &gt; $200/mo</text>

  <!-- Footer -->
  <line x1="80" y1="598" x2="1120" y2="598" stroke="#222" stroke-width="0.5"/>
  <text x="600" y="618" text-anchor="middle" font-size="10" fill="#444">DopeLab Studio — ink.dopelab.studio</text>
</svg>
