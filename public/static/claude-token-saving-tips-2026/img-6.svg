  <text x="843" y="342" font-size="12" fill="#c8ccd4">● 20× usage limit</text>
  <text x="843" y="362" font-size="12" fill="#c8ccd4">● Claude Code ทั้งวัน (8h+)</text>
  <text x="843" y="382" font-size="12" fill="#c8ccd4">● Multi-instance support</text>
  <text x="843" y="402" font-size="12" fill="#c8ccd4">● ราคา API estimate: $200-400/mo</text>
  <!-- Model pricing mini table -->
