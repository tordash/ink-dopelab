  <text x="843" y="430" font-size="9" fill="#FFCC00" dx="10" dy="5" letter-spacing="0.06em">MODEL PRICING (per 1M tokens)</text>
  <text x="853" y="456" font-size="11" fill="#888">Opus 4.6</text><text x="1125" y="456" text-anchor="end" font-size="11" fill="#c8ccd4">$5 in / $25 out</text>
  <text x="853" y="471" font-size="11" fill="#888">Sonnet 4.6</text><text x="1125" y="471" text-anchor="end" font-size="11" fill="#64ffda">$3 in / $15 out</text>
  <text x="853" y="486" font-size="11" fill="#888">Haiku 4.5</text><text x="1125" y="486" text-anchor="end" font-size="11" fill="#64ffda">$1 in / $5 out</text>
  <!-- Best for -->
  <rect x="843" y="494" width="292" height="28" rx="8" fill="rgba(255,204,0,0.10)" stroke="rgba(255,204,0,0.25)" stroke-width="1"/>
  <text x="989" y="513" text-anchor="middle" font-size="12" font-weight="600" fill="#FFCC00" filter="url(#glow6)">✦ Developer · Agency · Full-time dev</text>

