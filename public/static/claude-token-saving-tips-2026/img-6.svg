  <path d="M 380 300 H 425 V 210" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <!-- Step 2: Max 5x top-right (x=770, y=210) → Max 20x top-left (x=820, y=118) -->
  <path d="M 770 210 H 820 V 118" stroke="rgba(255,204,0,0.20)" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>

