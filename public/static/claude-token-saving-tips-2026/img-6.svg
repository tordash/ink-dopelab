  <text x="600" y="76" text-anchor="middle" font-weight="700" font-size="27" fill="#ffffff">Pro vs Max 5x vs Max 20x — เลือกแบบไหนคุ้ม?</text>
  <text x="600" y="100" text-anchor="middle" font-size="14" fill="#636980">3-tier guide สำหรับ Claude Code users · ราคา vs limit vs use case</text>

