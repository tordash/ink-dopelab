  <!-- Card starts at x=820, y=118, w=335, h=427 (bottom=545) -->
  <rect x="820" y="118" width="335" height="427" rx="14" fill="#0f0f1a" stroke="rgba(255,204,0,0.30)" stroke-width="1.5"/>
  <rect x="820" y="118" width="335" height="4" rx="2" fill="url(#goldGrad6)"/>
